# pm-executor configuration
# Credentials can also be set via environment variables:
#   POLY_API_KEY, POLY_API_SECRET, POLY_PASSPHRASE,
#   POLY_PRIVATE_KEY, POLY_MAKER_ADDRESS, POLY_SIGNER_ADDRESS

[credentials]
api_key = ""
api_secret = ""
passphrase = ""
private_key = ""
maker_address = ""
signer_address = ""

[connection]
pool_size = 2
address_family = "auto"  # "auto", "ipv4", or "ipv6"

[websocket]
# Legacy explicit Polymarket asset subscriptions. Still supported.
asset_ids = [
    "48825140812430902098404528620382945035793471220915259967486864813738884055220"
]
ws_channel_capacity = 1024
snapshot_channel_capacity = 256

# Future market-universe control plane shape. Parsing is supported now;
# live HTTP discovery arrives in a later spec.
# [websocket.market_universe]
# mode = "discovery"
# source_id = "gamma-primary"
# market_ids = [
#   "0xmarket-id-1",
#   "0xmarket-id-2",
# ]

# Explicit per-source bindings for strategies that do not use discovery.
# `pm-executor` currently resolves Polymarket WS asset IDs from these bindings
# plus the legacy `asset_ids` list and `[strategy].token_id`.
# [[websocket.source_bindings]]
# source_id = "polymarket-public"
# source_kind = "polymarket_ws"
# asset_ids = [
#   "48825140812430902098404528620382945035793471220915259967486864813738884055220",
#   "1234567890123456789012345678901234567890"
# ]
# market_ids = ["0xmarket-id-1"]

# [[websocket.source_bindings]]
# source_id = "reference-mid"
# source_kind = "external_reference"
# instrument_ids = ["BTC-USD"]

[strategy]
strategy = "threshold"
token_id = "48825140812430902098404528620382945035793471220915259967486864813738884055220"
side = "Buy"
size = "5"
order_type = "FOK"

[strategy.params]
threshold = 0.45

[execution]
presign_count = 100
is_neg_risk = false
fee_rate_bps = 0
dry_run = true   # SAFETY: set to false only when ready for real orders

[safety]
max_orders = 5           # Circuit breaker: max orders before stopping
max_usd_exposure = 10.0  # Circuit breaker: max total USD committed
max_triggers_per_second = 2  # Rate limit
require_confirmation = true  # Wait for order response before next

[health]
enabled = true
port = 9090

[logging]
level = "info"
