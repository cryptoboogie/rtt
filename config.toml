# pm-executor configuration
# Credentials can also be set via environment variables:
#   POLY_API_KEY, POLY_API_SECRET or POLY_SECRET, POLY_PASSPHRASE,
#   POLY_PRIVATE_KEY, POLY_MAKER_ADDRESS or POLY_PROXY_ADDRESS,
#   POLY_SIGNER_ADDRESS or POLY_ADDRESS
# `--validate-creds` only needs the API key/secret/passphrase plus signer/EOA address.
# Live trading also requires the private key and maker/proxy address.

[credentials]
api_key = ""
api_secret = ""
passphrase = ""
private_key = ""
maker_address = ""
signer_address = ""

[connection]
pool_size = 2
address_family = "auto"  # "auto", "ipv4", or "ipv6"

[websocket]
# Legacy explicit Polymarket asset subscriptions. The BTC 5m runtime resolves
# and rotates the current/next market tokens dynamically, so this can stay empty.
asset_ids = []
ws_channel_capacity = 1024
snapshot_channel_capacity = 256

# Future market-universe control plane shape. Parsing is supported now;
# live HTTP discovery arrives in a later spec.
# [websocket.market_universe]
# mode = "discovery"
# source_id = "gamma-primary"
# market_ids = [
#   "0xmarket-id-1",
#   "0xmarket-id-2",
# ]

# Explicit per-source bindings for strategies that do not use discovery.
# `pm-executor` currently resolves Polymarket WS asset IDs from these bindings
# plus the legacy `asset_ids` list and `[strategy].token_id`.
# [[websocket.source_bindings]]
# source_id = "polymarket-public"
# source_kind = "polymarket_ws"
# asset_ids = [
#   "48825140812430902098404528620382945035793471220915259967486864813738884055220",
#   "1234567890123456789012345678901234567890"
# ]
# market_ids = ["0xmarket-id-1"]

# [[websocket.source_bindings]]
# source_id = "reference-mid"
# source_kind = "external_reference"
# instrument_ids = ["BTC-USD"]

[strategy]
strategy = "btc_5m"
order_type = "FOK"

[strategy.params.btc_5m]
market_slug_prefix = "btc-updown-5m"
cadence_seconds = 300
prefetch_markets = 1
entry_window_start_seconds = 5
probe_window_end_seconds = 9
entry_window_end_seconds = 21
probe_budget_usd = 3.0
initial_burst_budget_usd = 5.0
max_pair_budget_usd = 45.0
max_single_side_budget_usd = 10.0
max_gross_deployed_per_market = 50.0
max_unpaired_exposure_usd = 12.0
carry_pair_sum_max = 0.96
attempt_cooldown_ms = 1000
cleanup_grace_ms = 1500
max_cleanup_loss_usd = 5.0
binance_ws_url = "wss://stream.binance.com:9443/ws/btcusdt@aggTrade"
binance_stale_after_ms = 1500
binance_buffer_window_ms = 5000
binance_continuation_window_ms = 3000
binance_min_move_bps = 0.5
binance_reversal_veto_bps = 0.5
allow_one_sided_continuation = false
one_sided_min_aligned_entry_bps = 2.0
risk_mode = "small_account"

[execution]
presign_count = 100
is_neg_risk = false
fee_rate_bps = 0
dry_run = true   # SAFETY: set to false only when ready for real orders
journal_db_path = "logs/pm-executor.sqlite3"

[safety]
max_orders = 1000            # Coarse operational cap, not a realized-loss stop
max_usd_exposure = 2000.0    # Coarse cumulative notional cap for long dry/live sessions
max_triggers_per_second = 4  # Pair entry may need buy + buy + cleanup in one second
require_confirmation = true  # Wait for order response before next

[health]
enabled = true
port = 9090

[logging]
level = "info"
